<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="28" fill="#1a0a0a"/>
  <!-- cardinal spokes -->
  <line x1="64" y1="64" x2="64"  y2="22"  stroke="#e04040" stroke-width="3.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="64" y1="64" x2="106" y2="64"  stroke="#e04040" stroke-width="3.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="64" y1="64" x2="64"  y2="106" stroke="#e04040" stroke-width="3.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="64" y1="64" x2="22"  y2="64"  stroke="#e04040" stroke-width="3.5" stroke-linecap="round" opacity="0.45"/>
  <!-- diagonal spokes -->
  <line x1="64" y1="64" x2="30" y2="30" stroke="#e04040" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="64" y1="64" x2="98" y2="30" stroke="#e04040" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="64" y1="64" x2="98" y2="98" stroke="#e04040" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="64" y1="64" x2="30" y2="98" stroke="#e04040" stroke-width="3.5" stroke-linecap="round"/>
  <!-- cardinal nodes -->
  <circle cx="64"  cy="22"  r="5" fill="#e04040" opacity="0.5"/>
  <circle cx="106" cy="64"  r="5" fill="#e04040" opacity="0.5"/>
  <circle cx="64"  cy="106" r="5" fill="#e04040" opacity="0.5"/>
  <circle cx="22"  cy="64"  r="5" fill="#e04040" opacity="0.5"/>
  <!-- diagonal nodes -->
  <circle cx="30" cy="30" r="7" fill="#e04040"/>
  <circle cx="98" cy="30" r="7" fill="#e04040"/>
  <circle cx="98" cy="98" r="7" fill="#e04040"/>
  <circle cx="30" cy="98" r="7" fill="#e04040"/>
  <!-- center -->
  <circle cx="64" cy="64" r="11" fill="#ffffff"/>
  <circle cx="64" cy="64" r="6"  fill="#e04040"/>
</svg>
