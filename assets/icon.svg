<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="28" fill="#0d0d14"/>
  <!-- cardinal spokes (faint) -->
  <line x1="64" y1="64" x2="64"  y2="22"  stroke="#5b8af0" stroke-width="3.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="64" y1="64" x2="106" y2="64"  stroke="#5b8af0" stroke-width="3.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="64" y1="64" x2="64"  y2="106" stroke="#5b8af0" stroke-width="3.5" stroke-linecap="round" opacity="0.45"/>
  <line x1="64" y1="64" x2="22"  y2="64"  stroke="#5b8af0" stroke-width="3.5" stroke-linecap="round" opacity="0.45"/>
  <!-- diagonal spokes (solid) -->
  <line x1="64" y1="64" x2="30" y2="30" stroke="#5b8af0" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="64" y1="64" x2="98" y2="30" stroke="#5b8af0" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="64" y1="64" x2="98" y2="98" stroke="#5b8af0" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="64" y1="64" x2="30" y2="98" stroke="#5b8af0" stroke-width="3.5" stroke-linecap="round"/>
  <!-- cardinal outer nodes -->
  <circle cx="64"  cy="22"  r="5" fill="#5b8af0" opacity="0.5"/>
  <circle cx="106" cy="64"  r="5" fill="#5b8af0" opacity="0.5"/>
  <circle cx="64"  cy="106" r="5" fill="#5b8af0" opacity="0.5"/>
  <circle cx="22"  cy="64"  r="5" fill="#5b8af0" opacity="0.5"/>
  <!-- diagonal outer nodes -->
  <circle cx="30" cy="30" r="7" fill="#5b8af0"/>
  <circle cx="98" cy="30" r="7" fill="#5b8af0"/>
  <circle cx="98" cy="98" r="7" fill="#5b8af0"/>
  <circle cx="30" cy="98" r="7" fill="#5b8af0"/>
  <!-- center -->
  <circle cx="64" cy="64" r="11" fill="#ffffff"/>
  <circle cx="64" cy="64" r="6"  fill="#5b8af0"/>
</svg>
