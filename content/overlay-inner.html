<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nexus</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a1a;
    --surface: #242424;
    --border: #333;
    --text: #e8e8e8;
    --subtext: #888;
    --accent: #5b8af0;
    --hover: #2e2e2e;
    --active: #353535;
    --radius: 12px;
    --shadow: 0 24px 80px rgba(0,0,0,.6);
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #fff;
      --surface: #f5f5f5;
      --border: #ddd;
      --text: #111;
      --subtext: #666;
      --hover: #efefef;
      --active: #e4e4e4;
      --shadow: 0 24px 80px rgba(0,0,0,.18);
    }
  }

  html, body { width: 100%; height: 100%; background: transparent; }

  #backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.45);
    backdrop-filter: blur(2px);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 14vh;
  }

  #palette {
    width: 640px;
    max-width: calc(100vw - 32px);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    max-height: 70vh;
  }

  #search-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }

  #search-icon {
    width: 18px; height: 18px; flex-shrink: 0;
    color: var(--subtext);
    fill: currentColor;
  }

  #search-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 16px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    caret-color: var(--accent);
  }
  #search-input::placeholder { color: var(--subtext); }

  #kb-hint {
    font-size: 11px;
    color: var(--subtext);
    white-space: nowrap;
    flex-shrink: 0;
  }

  #results {
    overflow-y: auto;
    overscroll-behavior: contain;
    max-height: calc(70vh - 58px);
  }
  #results:empty::after {
    content: 'No results';
    display: block;
    text-align: center;
    color: var(--subtext);
    font-size: 13px;
    padding: 24px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  .result-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    cursor: pointer;
    transition: background .1s;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .result-item:hover,
  .result-item.selected {
    background: var(--hover);
  }
  .result-item.selected { background: var(--active); }

  .item-icon {
    width: 22px; height: 22px;
    flex-shrink: 0;
    border-radius: 4px;
    object-fit: cover;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    background: transparent;
  }
  .item-icon img { width: 100%; height: 100%; border-radius: 4px; }

  .item-text { flex: 1; min-width: 0; }
  .item-title {
    font-size: 14px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-desc {
    font-size: 11px;
    color: var(--subtext);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 1px;
  }

  .item-keys {
    display: flex;
    gap: 3px;
    flex-shrink: 0;
  }
  .key-badge {
    font-size: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--subtext);
    padding: 1px 5px;
    border-radius: 4px;
    font-family: monospace;
  }

  .item-remove {
    width: 18px; height: 18px;
    opacity: 0;
    flex-shrink: 0;
    cursor: pointer;
    color: var(--subtext);
    transition: opacity .15s;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
  }
  .result-item:hover .item-remove { opacity: 1; }
  .item-remove:hover { color: #e05; }

  .section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--subtext);
    padding: 10px 16px 4px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  /* scrollbar */
  #results::-webkit-scrollbar { width: 6px; }
  #results::-webkit-scrollbar-track { background: transparent; }
  #results::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Filter chip ─────────────────────────────────────────── */
  #filter-chip {
    display: none;
    align-items: center;
    gap: 4px;
    padding: 2px 6px 2px 8px;
    border-radius: 20px;
    border: 1px solid;
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
    flex-shrink: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  #filter-chip-close {
    cursor: pointer;
    opacity: .7;
    font-size: 11px;
    line-height: 1;
    padding: 0 1px;
  }
  #filter-chip-close:hover { opacity: 1; }
</style>
</head>
<body>
<div id="backdrop">
  <div id="palette" role="dialog" aria-label="Nexus command palette">
    <div id="search-row">
      <svg id="search-icon" viewBox="0 0 20 20" aria-hidden="true">
        <circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
        <line x1="13" y1="13" x2="18" y2="18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span id="filter-chip"><span id="filter-chip-label"></span><span id="filter-chip-close">✕</span></span>
      <input id="search-input" type="text" placeholder='Search… or type "/" for filters' autocomplete="off" spellcheck="false">
      <span id="kb-hint">Esc to close</span>
    </div>
    <div id="results" role="listbox" aria-label="Results"></div>
  </div>
</div>

<script src="overlay-inner.js"></script>
</body>
</html>
