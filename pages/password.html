<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Password Required — Nexus</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --accent: #5b8af0; --bg: #0f0f0f; --surface: #1a1a1a; --text: #e8e8e8; --sub: #888; --border: #333; }
  @media (prefers-color-scheme: light) { :root { --bg: #f5f5f5; --surface: #fff; --text: #111; --sub: #666; --border: #ddd; } }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  body { display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px; text-align: center; padding: 32px; }
  .icon { font-size: 56px; }
  h1 { font-size: 28px; font-weight: 700; }
  p  { color: var(--sub); font-size: 15px; max-width: 380px; line-height: 1.5; }
  .field { display: flex; flex-direction: column; gap: 6px; width: 280px; }
  input[type=password] {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 10px 14px; font-size: 16px; outline: none; font-family: inherit;
  }
  input[type=password]:focus { border-color: var(--accent); }
  .btn { display: inline-block; padding: 10px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; font-family: inherit; font-weight: 500; width: 280px; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-outline  { background: transparent; border: 1px solid var(--sub); color: var(--text); }
  .btn:hover { opacity: .85; }
  .error { color: #e04; font-size: 13px; min-height: 18px; }
</style>
</head>
<body>
<div class="icon">🔐</div>
<h1>Password Required</h1>
<p>This site is protected by a block password. Enter it to continue.</p>
<div class="field">
  <input type="password" id="pw" placeholder="Enter password" autocomplete="off">
  <div class="error" id="error"></div>
</div>
<button class="btn btn-primary" id="btn-submit">Unlock</button>
<button class="btn btn-outline"  id="btn-back">← Go Back</button>
<script src="password.js"></script>
</body>
</html>
