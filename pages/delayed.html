<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Loading… — Nexus</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --accent: #f59e0b; --bg: #0f0f0f; --surface: #1a1a1a; --text: #e8e8e8; --sub: #888; }
  @media (prefers-color-scheme: light) { :root { --bg: #f5f5f5; --surface: #fff; --text: #111; --sub: #666; } }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  body { display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px; text-align: center; padding: 32px; }
  .icon { font-size: 56px; }
  h1 { font-size: 28px; font-weight: 700; }
  p  { color: var(--sub); font-size: 15px; max-width: 420px; line-height: 1.5; }
  .countdown {
    font-size: 64px; font-weight: 800; color: var(--accent);
    font-variant-numeric: tabular-nums; letter-spacing: -.02em;
  }
  .progress-track { width: 280px; height: 6px; background: var(--surface); border-radius: 3px; overflow: hidden; }
  .progress-bar   { height: 100%; background: var(--accent); border-radius: 3px; transition: width .95s linear; }
  .actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .btn { display: inline-block; padding: 10px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; font-family: inherit; font-weight: 500; }
  .btn-outline { background: transparent; border: 1px solid var(--sub); color: var(--text); }
  .btn:hover { opacity: .85; }
</style>
</head>
<body>
<div class="icon">⏳</div>
<h1>Hold on…</h1>
<p>This site is in your block list. A brief delay gives you a moment to reconsider.</p>
<div class="countdown" id="countdown">—</div>
<div class="progress-track"><div class="progress-bar" id="progress" style="width:100%"></div></div>
<div class="actions">
  <button class="btn btn-outline" id="btn-back">← Go Back</button>
  <button class="btn btn-outline" id="btn-cancel">Cancel Delay</button>
</div>
<script src="delayed.js"></script>
</body>
</html>
