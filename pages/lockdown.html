<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lockdown — Nexus Focus Guard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --accent: #e04; --bg: #0f0f0f; --surface: #1a1a1a; --text: #e8e8e8; --sub: #888; --border: #333; }
  @media (prefers-color-scheme: light) { :root { --bg: #f5f5f5; --surface: #fff; --text: #111; --sub: #666; --border: #ddd; } }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  body { display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px; text-align: center; padding: 32px; }
  .icon { font-size: 56px; }
  h1 { font-size: 28px; font-weight: 700; }
  p  { color: var(--sub); font-size: 15px; max-width: 420px; line-height: 1.5; }
  .duration-row { display: flex; gap: 10px; align-items: center; justify-content: center; flex-wrap: wrap; }
  label { font-size: 13px; color: var(--sub); }
  input[type=number] {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    border-radius: 8px; padding: 8px 12px; font-size: 16px; width: 80px; text-align: center;
    outline: none; font-family: inherit;
  }
  input[type=number]:focus { border-color: var(--accent); }
  .btn { display: inline-block; padding: 10px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; font-family: inherit; font-weight: 500; }
  .btn-danger  { background: var(--accent); color: #fff; }
  .btn-outline { background: transparent; border: 1px solid var(--sub); color: var(--text); }
  .btn:hover { opacity: .85; }
  .actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .status { font-size: 13px; color: var(--sub); min-height: 20px; }
</style>
</head>
<body>
<div class="icon">🔒</div>
<h1>Lockdown Mode</h1>
<p>Enable lockdown to block all sites in your block sets for a fixed duration. Lockdown cannot be overridden without the lockdown password.</p>
<div class="duration-row">
  <label for="hours">Hours</label>
  <input type="number" id="hours" min="0" max="24" value="1">
  <label for="mins">Minutes</label>
  <input type="number" id="mins"  min="0" max="59" value="0">
</div>
<div class="actions">
  <button class="btn btn-danger"  id="btn-lock">Enable Lockdown</button>
  <button class="btn btn-outline" id="btn-cancel-lock">Cancel Lockdown</button>
</div>
<div class="status" id="status"></div>
<button class="btn btn-outline" style="margin-top:8px" id="btn-close">Close</button>
<script src="lockdown.js"></script>
</body>
</html>
