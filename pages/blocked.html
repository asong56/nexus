<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Site Blocked — Nexus</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --accent: #e04; --bg: #0f0f0f; --surface: #1a1a1a; --text: #e8e8e8; --sub: #888; }
  @media (prefers-color-scheme: light) {
    :root { --bg: #f5f5f5; --surface: #fff; --text: #111; --sub: #666; }
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  body { display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 20px; text-align: center; padding: 32px; }
  .icon { font-size: 56px; user-select: none; }
  h1 { font-size: 28px; font-weight: 700; }
  p  { color: var(--sub); font-size: 15px; max-width: 420px; line-height: 1.5; }
  .url { font-size: 13px; color: var(--sub); word-break: break-all; margin-top: -8px; }
  .btn {
    display: inline-block; padding: 10px 24px; border-radius: 8px; font-size: 14px;
    text-decoration: none; cursor: pointer; border: none; font-family: inherit; font-weight: 500;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-outline  { background: transparent; border: 1px solid var(--sub); color: var(--text); }
  .btn:hover { opacity: .85; }
  .actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .set-name { font-size: 12px; color: var(--sub); }
</style>
</head>
<body>
<div class="icon">🚫</div>
<h1>Site Blocked</h1>
<p id="custom-msg">This site is blocked by Focus Guard.</p>
<p class="url" id="blocked-url"></p>
<p class="set-name" id="set-name"></p>
<div class="actions">
  <button class="btn btn-primary" id="btn-back">← Go Back</button>
  <button class="btn btn-outline"  id="btn-close">Close Tab</button>
  <button class="btn btn-outline"  id="btn-options">Settings</button>
</div>
<script src="blocked.js"></script>
</body>
</html>
